server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 10.10.0.0/16;
    real_ip_recursive on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    index index.php;

    charset utf-8;

    # COOP/COEP para SharedArrayBuffer — requerido por Chrome para ScummVM WASM con hilos
    location ^~ /gaming {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Tipo MIME para WebAssembly — requerido para WebAssembly.instantiateStreaming()
    # Sin este tipo, Chrome y Firefox rechazan la compilación del motor ScummVM.
    location ^~ /engine/ {
        types {
            application/wasm  wasm;
            application/javascript  js;
        }
        gzip off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Accept-Ranges bytes always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Datos de los juegos — soporte de rango parcial para archivos grandes
    # Accept-Ranges permite que el VFS de Emscripten haga fseek() via HTTP Range.
    location ^~ /games/ {
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Launcher JS del arcade — sin caché para facilitar actualizaciones
    location = /js/scummvm-launcher.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /login {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
